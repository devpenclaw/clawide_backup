<!DOCTYPE html>
<html>
<head>
    <title>Futures Bot Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Binance Futures Bot</h1>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Control Panel</h5>
                <button id="startBtn" class="btn btn-success me-2">Start Bot</button>
                <button id="stopBtn" class="btn btn-danger" disabled>Stop Bot</button>
                <hr>
                <p>Status: <span id="status" class="badge bg-secondary">Stopped</span></p>
                <p>Position: <span id="position">None</span></p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Live Logs</h5>
                <pre id="logs" class="bg-dark text-white p-3" style="height: 300px; overflow-y: scroll;"></pre>
            </div>
        </div>
    </div>

    <script>
        var socket = io();
        var startBtn = document.getElementById('startBtn');
        var stopBtn = document.getElementById('stopBtn');
        var logs = document.getElementById('logs');
        var statusBadge = document.getElementById('status');

        startBtn.onclick = function() {
            socket.emit('start_bot');
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        stopBtn.onclick = function() {
            socket.emit('stop_bot');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        socket.on('log', function(msg) {
            logs.textContent += msg.data + '\n';
            logs.scrollTop = logs.scrollHeight;
        });

        fetch('/status')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'running') {
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    statusBadge.textContent = 'Running';
                    statusBadge.classList.remove('bg-secondary');
                    statusBadge.classList.add('bg-success');
                    document.getElementById('position').textContent = data.in_position ? 'Long' : 'None';
                }
            });
    </script>
</body>
</html>
